<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Almacén - MAKERSAGO S.A.C</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --gv-celeste: #00ADEF;
            --gv-amarillo: #FFD100;
            --gv-oscuro: #1A2B3C;
        }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .bg-gv-celeste { background-color: var(--gv-celeste); }
        .text-gv-celeste { color: var(--gv-celeste); }
        .bg-gv-amarillo { background-color: var(--gv-amarillo); }
        .btn-primary { background-color: var(--gv-celeste); color: white; transition: all 0.3s; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .input-gv { width: 100%; padding: 0.75rem 1rem; border: 2px solid #f1f5f9; border-radius: 0.75rem; outline: none; }
        .input-gv:focus { border-color: var(--gv-celeste); }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURACIÓN ---
        // Pega aquí tu URL de Google Apps Script para sincronizar con el Excel
        const WEB_APP_URL = ""; 
        const LOGO_URL = "https://yt3.googleusercontent.com/wDJ14y5wTpSE6ZsVCLFMbFaQtRczCJHdlRleD9vcN6f60dpW_itn7taUD3OSWgN9vHQcj1AX2Gw=s900-c-k-c0x00ffffff-no-rj";

        const RESPONSABLES = ["Ronny Chacón", "Jazmin De la Cruz", "Jesús Junior Velásquez", "Saul Emanuel Mostacero"];
        const MODELOS = ["IN01-WIFI/LAN", "IN01- LAN", "IN01- 4G", "SenceFace 2A", "SenceFace 3A", "SenseFace 7A", "X628-C", "KA5000- 4G", "S922- 4G", "UFACE800-WIFI/LAN", "SPEEDFACE-V4L", "SPEEDFACE-V5L", "MB10-VL WIFI", "160PRO", "460PRO"];

        function App() {
            const [activeTab, setActiveTab] = useState('config');
            const [timerActive, setTimerActive] = useState(null);
            const [startTime, setStartTime] = useState(null);
            const [elapsed, setElapsed] = useState(0);
            const [registros, setRegistros] = useState([]);

            const [formConfig, setFormConfig] = useState({
                ticket: '', salesOrder: '', responsable: RESPONSABLES[0],
                modelo: MODELOS[0], serie: '', empresa: '', ip: '', mac: '', firmware: '', comentarios: ''
            });

            const [formCreacion, setFormCreacion] = useState({
                ticket: '', serie: '', empresa: '', asistencia: true, acceso: false, creado: true, grupos: true, cantUsuarios: ''
            });

            useEffect(() => {
                let interval;
                if (timerActive) {
                    interval = setInterval(() => {
                        setElapsed(Math.floor((new Date() - startTime) / 1000));
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [timerActive, startTime]);

            const formatTimer = (sec) => {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const handleStart = (type) => {
                setStartTime(new Date());
                setTimerActive(type);
            };

            const handleSave = async (type) => {
                const endTime = new Date();
                const duracion = ((endTime - startTime) / 60000).toFixed(2);
                
                const nuevoRegistro = {
                    type,
                    data: type === 'config' ? {...formConfig} : {...formCreacion},
                    fecha: new Date().toLocaleDateString(),
                    inicio: startTime.toLocaleTimeString(),
                    fin: endTime.toLocaleTimeString(),
                    duracion
                };

                // Guardar en estado local (ya que no hay Firebase configurado en este ejemplo directo)
                setRegistros([nuevoRegistro, ...registros]);

                // Sincronizar con Google Sheets si la URL existe
                if (WEB_APP_URL) {
                    fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(nuevoRegistro)
                    });
                }

                setTimerActive(null);
                setElapsed(0);
                alert("Guardado correctamente y sincronizado.");
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-[#1A2B3C] text-white p-4 shadow-xl sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src={LOGO_URL} className="w-12 h-12 rounded-lg bg-white p-1" alt="Logo" />
                                <div>
                                    <h1 className="font-black text-xl tracking-tight uppercase leading-none">GESTIÓN DE ALMACÉN</h1>
                                    <span className="text-[#00ADEF] font-black text-[10px] tracking-[0.3em]">SOPORTE TÉCNICO SSTT</span>
                                </div>
                            </div>
                            <nav className="flex bg-slate-800/40 p-1 rounded-2xl border border-slate-700 text-[11px] font-black">
                                <button onClick={() => setActiveTab('config')} className={`px-5 py-2 rounded-xl transition-all ${activeTab === 'config' ? 'bg-[#00ADEF] text-white' : 'text-slate-400'}`}>HARDWARE</button>
                                <button onClick={() => setActiveTab('creacion')} className={`px-5 py-2 rounded-xl transition-all ${activeTab === 'creacion' ? 'bg-[#FFD100] text-slate-900' : 'text-slate-400'}`}>PLATAFORMA</button>
                                <button onClick={() => setActiveTab('historial')} className={`px-5 py-2 rounded-xl transition-all ${activeTab === 'historial' ? 'bg-white text-slate-900' : 'text-slate-400'}`}>REPORTES</button>
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6 flex-grow w-full">
                        {activeTab === 'config' && (
                            <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                                <div className="lg:col-span-3 bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="bg-gv-celeste p-5 text-white font-black text-xs tracking-widest uppercase">Registro Técnico de Equipos</div>
                                    <div className="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-4">
                                            <input className="input-gv" placeholder="Ticket" value={formConfig.ticket} onChange={e => setFormConfig({...formConfig, ticket: e.target.value})} />
                                            <input className="input-gv" placeholder="Serie (SN)" value={formConfig.serie} onChange={e => setFormConfig({...formConfig, serie: e.target.value})} />
                                            <select className="input-gv" value={formConfig.modelo} onChange={e => setFormConfig({...formConfig, modelo: e.target.value})}>
                                                {MODELOS.map(m => <option key={m}>{m}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-4">
                                            <input className="input-gv" placeholder="Empresa Cliente" value={formConfig.empresa} onChange={e => setFormConfig({...formConfig, empresa: e.target.value})} />
                                            <input className="input-gv" placeholder="IP Address" value={formConfig.ip} onChange={e => setFormConfig({...formConfig, ip: e.target.value})} />
                                            <textarea className="input-gv h-24" placeholder="Comentarios..." value={formConfig.comentarios} onChange={e => setFormConfig({...formConfig, comentarios: e.target.value})} />
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-gv-celeste text-center sticky top-28">
                                        <div className="text-5xl font-mono font-black text-slate-900 mb-8">{timerActive === 'config' ? formatTimer(elapsed) : "00:00"}</div>
                                        {timerActive === 'config' ? (
                                            <button onClick={() => handleSave('config')} className="w-full btn-primary py-4 rounded-2xl font-black">GUARDAR</button>
                                        ) : (
                                            <button onClick={() => handleStart('config')} className="w-full bg-[#1A2B3C] text-white py-4 rounded-2xl font-black">INICIAR</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'creacion' && (
                            <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                                <div className="lg:col-span-3 bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="bg-gv-amarillo p-5 text-slate-900 font-black text-xs tracking-widest uppercase">Registro en GeoVictoria</div>
                                    <div className="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-4">
                                            <input className="input-gv" placeholder="Ticket" value={formCreacion.ticket} onChange={e => setFormCreacion({...formCreacion, ticket: e.target.value})} />
                                            <input className="input-gv" placeholder="Serie (SN)" value={formCreacion.serie} onChange={e => setFormCreacion({...formCreacion, serie: e.target.value})} />
                                            <input className="input-gv" placeholder="Empresa" value={formCreacion.empresa} onChange={e => setFormCreacion({...formCreacion, empresa: e.target.value})} />
                                        </div>
                                        <div className="bg-slate-50 p-6 rounded-2xl space-y-3">
                                            {['asistencia', 'acceso', 'creado', 'grupos'].map(id => (
                                                <label key={id} className="flex items-center justify-between p-3 bg-white rounded-xl border border-slate-200 text-xs font-bold uppercase">
                                                    <span>{id}</span>
                                                    <input type="checkbox" checked={formCreacion[id]} onChange={e => setFormCreacion({...formCreacion, [id]: e.target.checked})} className="w-5 h-5 accent-gv-celeste" />
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-gv-amarillo text-center sticky top-28">
                                        <div className="text-5xl font-mono font-black text-slate-900 mb-8">{timerActive === 'creacion' ? formatTimer(elapsed) : "00:00"}</div>
                                        {timerActive === 'creacion' ? (
                                            <button onClick={() => handleSave('creacion')} className="w-full bg-[#FFD100] text-slate-900 py-4 rounded-2xl font-black">GUARDAR</button>
                                        ) : (
                                            <button onClick={() => handleStart('creacion')} className="w-full bg-[#1A2B3C] text-white py-4 rounded-2xl font-black">INICIAR</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'historial' && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-4 bg-gv-celeste text-white font-black text-xs">RECIENTES</div>
                                    <table className="w-full text-left text-xs">
                                        <thead className="bg-slate-50 text-slate-400 font-black border-b">
                                            <tr>
                                                <th className="p-4">FECHA</th>
                                                <th className="p-4">TICKET</th>
                                                <th className="p-4">TIPO</th>
                                                <th className="p-4">DURACIÓN</th>
                                                <th className="p-4">FIN</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {registros.map((r, i) => (
                                                <tr key={i} className="border-b hover:bg-slate-50">
                                                    <td className="p-4">{r.fecha}</td>
                                                    <td className="p-4 font-bold">{r.data.ticket}</td>
                                                    <td className="p-4 uppercase">{r.type}</td>
                                                    <td className="p-4 text-gv-celeste font-bold">{r.duracion} MIN</td>
                                                    <td className="p-4">{r.fin}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-white border-t p-4 text-center text-[10px] text-slate-400 font-black uppercase tracking-widest">
                        Powered by MAKERSAGOS S.A.C • SSTT 2026
                    </footer>

                    {timerActive && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-[#1A2B3C] text-white px-8 py-4 rounded-full shadow-2xl flex items-center gap-4 z-50 animate-bounce border-2 border-gv-celeste">
                            <span className="text-[10px] font-black uppercase">Cronómetro Activo:</span>
                            <span className="text-xl font-mono font-black text-gv-amarillo">{formatTimer(elapsed)}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
